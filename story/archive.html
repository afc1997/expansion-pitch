      opacity: 0;
      mix-blend-mode: difference;
      transition: width 0.2s ease, height 0.2s ease, opacity 0.2s;
    }
    .cursor::before, .cursor::after {
      content: ''; position: absolute; background: #fff;
    }
    .cursor::before { width: 1px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
    .cursor::after { width: 100%; height: 1px; top: 50%; left: 0; transform: translateY(-50%); }
    .cursor.visible { opacity: 1; }
    .cursor.hover { width: 32px; height: 32px; }

    .archive-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;

      letter-spacing: 0.08em; text-transform: uppercase;

    .archive-nav a { color: #fff; text-decoration: none; opacity: 0.5; transition: opacity 0.3s; }

    .archive-nav-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 15px; font-weight: 300; letter-spacing: 0.15em; opacity: 1 !important;
    }

    .cylinder-scene {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      perspective: 1600px;
      perspective-origin: 50% 42%;
    }
    .cylinder-body { transform-style: preserve-3d; position: relative; }
    .cylinder-row {
      transform-style: preserve-3d;
      width: 0; height: 0; position: absolute;
    }

    .cylinder-item {
      position: absolute;
      width: 170px;
      left: -85px; top: -58px;
      backface-visibility: visible;
      cursor: pointer;
      transition: filter 0.3s;
    }
    .cylinder-item:hover { filter: brightness(1.15); }

    .cylinder-item-media {
      position: relative;
      width: 100%; height: 96px;
      overflow: hidden;
    }
    .cylinder-item img, .cylinder-item video {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    .cylinder-item-name {
      margin-top: 5px;

      font-size: 8px; font-weight: 400;

      transition: opacity 0.3s;
    }
    .cylinder-item--video:hover .cylinder-item-media::after { opacity: 0; }

    .loader {
      position: fixed; inset: 0; z-index: 9000; background: #000;
      display: flex; align-items: center; justify-content: center;

      background: rgba(255,255,255,0.08);

    .ap-info {

  const loader = document.getElementById('loader');
  const loaderFill = document.getElementById('loader-fill');
  const loaderPct = document.getElementById('loader-pct');
  const sceneEl = document.getElementById('scene');
  sceneEl.style.opacity = '0';

  function preloadMedia() {
    const imgs = MEDIA.filter(m => m.type === 'image');
    const vids = MEDIA.filter(m => m.type === 'video');
    const total = imgs.length + vids.length;
    let loaded = 0;
    function tick() {
      loaded++;
      const pct = Math.round((loaded / total) * 100);
      loaderFill.style.width = pct + '%';
      loaderPct.textContent = pct + '%';
      if (loaded >= total) {
        sceneEl.style.transition = 'opacity 0.8s ease';
        sceneEl.style.opacity = '1';
        loader.classList.add('done');
        setTimeout(() => loader.style.display = 'none', 800);
      }
    }
    imgs.forEach(item => {
      const img = new Image();
      img.onload = tick; img.onerror = tick;
      img.src = item.src;
    });
    vids.forEach(() => tick());
  }

    const j = Math.floor(Math.random() * (i + 1));
    [MEDIA[i], MEDIA[j]] = [MEDIA[j], MEDIA[i]];
  }

  // ── Cylinder ──
  // 9 items per row on the cylinder. ~6 visible across, edges curve away.
  // Small items (150px), tight gaps, large radius = feels like a grid that curves.

  const ANGLE_STEP = 360 / PER_ROW;   // 40°
  const RADIUS = 410;
  const ROW_H = 145;

  const numRows = Math.ceil(MEDIA.length / PER_ROW);

    let slice = MEDIA.slice(r * PER_ROW, (r + 1) * PER_ROW);
    // Always fill to 8 — wrap from start if needed
    while (slice.length < PER_ROW) slice.push(MEDIA[slice.length % MEDIA.length]);
    const rowEl = document.createElement('div');
    rowEl.className = 'cylinder-row';
    rowEl.style.top = (r * ROW_H) + 'px';

    const offset = r % 2 === 0 ? 0 : ANGLE_STEP * 0.5;

    slice.forEach((item, j) => {
      const angle = offset + j * ANGLE_STEP;
      const el = document.createElement('div');
      el.className = 'cylinder-item' + (item.type === 'video' ? ' cylinder-item--video' : '');

      if (item.type === 'image') {
        const img = document.createElement('img');
        img.loading = 'lazy'; img.src = item.src; img.alt = item.name;
        mediaWrap.appendChild(img);
      } else {
        const vid = document.createElement('video');
        vid.muted = true; vid.loop = true; vid.playsInline = true;
        vid.preload = 'auto'; vid.src = item.src;
        vid.autoplay = true;
        mediaWrap.appendChild(vid);
        vid.play().catch(() => {});
      }
      el.appendChild(mediaWrap);

      const nameEl = document.createElement('div');
      nameEl.className = 'cylinder-item-name';
      nameEl.textContent = item.name;
      el.appendChild(nameEl);

      if (item.sub) {
        const subEl = document.createElement('div');
        subEl.className = 'cylinder-item-sub';
        subEl.textContent = item.sub;
        el.appendChild(subEl);
      }

      el.addEventListener('click', () => { if (!dragMoved) openLightbox(r * PER_ROW + j); });
      rowEl.appendChild(el);
    });

    cylinderBody.appendChild(rowEl);
    const itemAngles = slice.map((_, j) => offset + j * ANGLE_STEP);
    const itemEls = Array.from(rowEl.children);
    rows.push({ el: rowEl, angle: offset, baseAngle: offset, dir: r % 2 === 0 ? 1 : -1, speed: 0.012 + Math.random() * 0.008, itemAngles, itemEls });
  }

  preloadMedia();

  // ── Scroll moves vertically only. Rows auto-rotate very slowly. ──
  let scrollTarget = 0;
  let scrollCurrent = 0;
  const maxScroll = numRows * ROW_H;

  window.addEventListener('wheel', e => {
    if (document.querySelector('.lb.is-open')) return;
    e.preventDefault();
    const d = Math.abs(e.deltaY) >= Math.abs(e.deltaX) ? e.deltaY : e.deltaX;
    scrollTarget = Math.max(0, Math.min(scrollTarget + d * 0.8, maxScroll));
  }, { passive: false });

  // ── Touch scroll ──
  let touchStartY = 0, touchScrollStart = 0;
  window.addEventListener('touchstart', e => {
    if (document.querySelector('.lb.is-open')) return;
    touchStartY = e.touches[0].clientY;
    touchScrollStart = scrollTarget;
  }, { passive: true });
  window.addEventListener('touchmove', e => {
    if (document.querySelector('.lb.is-open')) return;
    e.preventDefault();
    const dy = touchStartY - e.touches[0].clientY;
    scrollTarget = Math.max(0, Math.min(touchScrollStart + dy * 1.2, maxScroll));
  }, { passive: false });

  // ── Drag to spin ──
  let isDragging = false;
  let dragStartX = 0;
  let dragRow = null;
  let dragStartAngle = 0;
  let dragMoved = false;

  cylinderBody.addEventListener('mousedown', e => {
    if (e.target.closest('.lb')) return;
    isDragging = true;
    dragMoved = false;
    dragStartX = e.clientX;
    // Find which row was clicked
    const item = e.target.closest('.cylinder-item');
    if (item) {
      const rowEl = item.parentElement;
      dragRow = rows.find(r => r.el === rowEl) || null;
    } else {
      dragRow = null;
    }
    if (dragRow) dragStartAngle = dragRow.angle;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!isDragging || !dragRow) return;
    const dx = e.clientX - dragStartX;
    if (Math.abs(dx) > 3) dragMoved = true;
    dragRow.angle = dragStartAngle + dx * 0.3;
  });

  document.addEventListener('mouseup', () => {
    isDragging = false;
    dragRow = null;
  });

  function animate() {
    scrollCurrent += (scrollTarget - scrollCurrent) * 0.06;

    rows.forEach(row => {
      // Skip auto-rotation if this row is being dragged
      if (!(isDragging && dragRow === row)) {
        row.angle += row.speed * row.dir;
      }
      row.el.style.transform = `rotateY(${row.angle}deg)`;

      // Fade items based on facing: front-facing = full opacity, back-facing = dim + flipped
      row.itemEls.forEach((el, j) => {
        const itemAngle = row.itemAngles[j];
        // Total angle of this item in world space
        const total = ((row.angle + itemAngle) % 360 + 360) % 360;
        // cos of angle: 1 = facing camera, -1 = facing away
        const facing = Math.cos(total * Math.PI / 180);
        // Front: opacity 1, back: opacity 0.15
        if (facing > 0) {
          el.style.opacity = 1;
        } else {
          el.style.opacity = 0.12;
        }
      });
    });

    cylinderBody.style.transform = `translateY(${-scrollCurrent}px)`;
    requestAnimationFrame(animate);
  }
  animate();

  // ── Lightbox ──
  const lb = document.getElementById('lb');
  const lbContent = document.getElementById('lb-content');
  const lbCaption = document.getElementById('lb-caption');

  function openLightbox(idx) {
    const item = MEDIA[idx];
    if (!item) return;
    lbContent.innerHTML = '';
    if (item.type === 'video') {
      const vid = document.createElement('video');
      vid.src = item.hq || item.src;
      vid.controls = true; vid.autoplay = true; vid.playsInline = true;
      lbContent.appendChild(vid);
    } else {
      const img = document.createElement('img');
      img.src = item.src;
      lbContent.appendChild(img);
    }
    lbCaption.textContent = item.name + (item.sub ? ' — ' + item.sub : '');
    lb.classList.add('is-open');
  }

  function closeLightbox() {
    lb.classList.remove('is-open');
    const vid = lbContent.querySelector('video');
    if (vid) { vid.pause(); vid.src = ''; }
    lbContent.innerHTML = '';
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && lb.classList.contains('is-open')) closeLightbox();
  });

  // ── Audio player ──
  (function() {
    const src = '../assets/audio/zone-of-interest-full.mp3';
    const playBtn = document.getElementById('ap-play');
    const waveformEl = document.getElementById('ap-waveform');
    const canvas = waveformEl.querySelector('canvas');
    const progressEl = document.getElementById('ap-progress');
    const timeEl = document.getElementById('ap-time');
    const audio = new Audio();
    audio.preload = 'none';
    audio.src = src;
    let loaded = false;

    function fmt(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ':' + String(sec).padStart(2, '0');
    }

    function drawWaveform(buffer) {
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx.scale(dpr, dpr);
      const data = buffer.getChannelData(0);
      const bars = Math.floor(w / 2.5);
      const step = Math.floor(data.length / bars);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      for (let i = 0; i < bars; i++) {
        let sum = 0;
        for (let j = 0; j < step; j++) sum += Math.abs(data[i * step + j]);
        const avg = sum / step;
        const barH = Math.max(1, avg * h * 2.5);
        ctx.fillRect(i * 2.5, (h - barH) / 2, 1, barH);
      }
    }

    // Draw placeholder
    (function() {
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx.scale(dpr, dpr);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      const bars = Math.floor(w / 2.5);
      for (let i = 0; i < bars; i++) {
        const barH = Math.random() * h * 0.6 + 1;
        ctx.fillRect(i * 2.5, (h - barH) / 2, 1, barH);
      }
    })();

    // Load real waveform
    fetch(src)
      .then(r => r.arrayBuffer())
      .then(buf => new (window.AudioContext || window.webkitAudioContext)().decodeAudioData(buf))
      .then(drawWaveform)
      .catch(() => {});

    playBtn.addEventListener('click', () => {
      if (!loaded) { audio.load(); loaded = true; }
      if (audio.paused) {
        audio.play();
        playBtn.innerHTML = '&#10074;&#10074;';
      } else {
        audio.pause();
        playBtn.innerHTML = '&#9654;';
      }
    });

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        progressEl.style.width = (audio.currentTime / audio.duration * 100) + '%';
        timeEl.textContent = fmt(audio.currentTime);
      }
    });

    audio.addEventListener('ended', () => {
      playBtn.innerHTML = '&#9654;';
      progressEl.style.width = '0%';
      timeEl.textContent = '0:00';
    });

    waveformEl.addEventListener('click', e => {
      if (!loaded) { audio.load(); loaded = true; }
      const rect = waveformEl.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      if (audio.duration) {
        audio.currentTime = pct * audio.duration;
        if (audio.paused) { audio.play(); playBtn.innerHTML = '&#10074;&#10074;'; }
      }
    });
  })();

  // ── Cursor ──
  const cursor = document.createElement('div');
  cursor.className = 'cursor';
  document.body.appendChild(cursor);
  let mx = 0, my = 0, cx = 0, cy = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cursor.classList.add('visible'); });
  document.addEventListener('mouseleave', () => cursor.classList.remove('visible'));
  document.addEventListener('mouseover', e => { if (e.target.closest('a,button,.cylinder-item')) cursor.classList.add('hover'); });
  document.addEventListener('mouseout', e => { if (e.target.closest('a,button,.cylinder-item')) cursor.classList.remove('hover'); });
  (function cursorLoop() {
    cx += (mx - cx) * 0.1; cy += (my - cy) * 0.1;
    cursor.style.transform = `translate(calc(${cx}px - 50%), calc(${cy}px - 50%))`;
    requestAnimationFrame(cursorLoop);
  })();
  </script>
</body>
</html>
