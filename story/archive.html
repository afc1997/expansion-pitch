  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      top: 0; left: 0;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #fff;
      mix-blend-mode: difference;
      pointer-events: none;
      z-index: 10000;
      opacity: 0;
      transition: width 0.25s, height 0.25s, opacity 0.2s;
    }
    .cursor.visible { opacity: 1; }
    .cursor.hover { width: 40px; height: 40px; }

    /* Nav */
    .archive-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 40px;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .archive-nav a {
      color: #fff;
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.3s;
    }
    .archive-nav a:hover { opacity: 1; }
    .archive-nav-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 0.15em;
      opacity: 1 !important;
    }

    /* Cylinder scene */
    .cylinder-scene {
      width: 100%;
      perspective: 1200px;
      perspective-origin: 50% 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 120px 0 80px;
    }

    .cylinder-row {
      transform-style: preserve-3d;
      width: 0; height: 0;
      position: relative;
      margin: 10px 0;
    }

    .cylinder-item {
      position: absolute;
      width: 200px;
      height: 140px;
      left: -100px;
      top: -70px;
      overflow: hidden;
      backface-visibility: hidden;
      cursor: pointer;
      transition: filter 0.3s;
    }
    .cylinder-item:hover { filter: brightness(1.2); }

    .cylinder-item img,
    .cylinder-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cylinder-item-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 20px 8px 6px;
      font-size: 9px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .cylinder-item:hover .cylinder-item-label { opacity: 1; }

    /* Video play indicator */
    .cylinder-item--video::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      border-style: solid;
      border-width: 8px 0 8px 14px;
      border-color: transparent transparent transparent rgba(255,255,255,0.6);
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .cylinder-item--video:hover::after { opacity: 0; }

    /* Lightbox */
    .lb { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; }
    .lb.is-open { display: flex; }
    .lb-close { position: absolute; top: 24px; right: 32px; background: none; border: none; color: #fff; font-size: 32px; cursor: pointer; z-index: 201; opacity: 0.6; }
    .lb-close:hover { opacity: 1; }
    .lb-content { max-width: 88vw; max-height: 85vh; }
    .lb-content img, .lb-content video { max-width: 88vw; max-height: 85vh; display: block; }
    .lb-caption { position: absolute; bottom: 24px; left: 0; right: 0; text-align: center; font-size: 12px; letter-spacing: 0.06em; color: rgba(255,255,255,0.5); }

    /* Loader */
    .loader {
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease;
    }
    .loader.done { opacity: 0; pointer-events: none; }
    .loader-inner { text-align: center; }
    .loader-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 28px;
      letter-spacing: 0.35em;
      margin-bottom: 24px;
    }
    .loader-bar {
      width: 180px;
      height: 1px;
      background: rgba(255,255,255,0.15);
      margin: 0 auto;
    }
    .loader-bar-fill {
      height: 100%;
      width: 0%;
      background: #fff;
      transition: width 0.2s;
    }
    .loader-pct {
      margin-top: 12px;
      font-size: 11px;
      letter-spacing: 0.1em;
      opacity: 0.4;
    }

    /* Film grain */
    .grain {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.035;

      background-size: 128px;
    }
  </style>

  const loader = document.getElementById('loader');

  const sceneEl = document.getElementById('scene');
  sceneEl.style.opacity = '0';

  function preloadMedia() {
    const items = MEDIA.filter(m => m.type === 'image');
    const vidItems = MEDIA.filter(m => m.type === 'video');
    const total = items.length + vidItems.length;
    let loaded = 0;

    function tick() {
      loaded++;
      const pct = Math.round((loaded / total) * 100);
      loaderFill.style.width = pct + '%';
      loaderPct.textContent = pct + '%';
      if (loaded >= total) finishLoading();
    }

    items.forEach(item => {
      const img = new Image();
      img.onload = tick;
      img.onerror = tick;
      img.src = item.src;
    });

    // For videos, just count them as loaded (they lazy-load on hover)
    vidItems.forEach(() => tick());
  }

  function finishLoading() {
    sceneEl.style.transition = 'opacity 0.6s ease';
    sceneEl.style.opacity = '1';
    loader.classList.add('done');
    setTimeout(() => { loader.style.display = 'none'; }, 700);
  }

  // ── Shuffle for visual variety ──
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
  shuffle(MEDIA);

  // ── Build cylinder ──
  const scene = document.getElementById('scene');
  const ITEMS_PER_ROW = 8;
  const ITEM_W = 220;
  const GAP = 20;
  const circumference = ITEMS_PER_ROW * (ITEM_W + GAP);
  const RADIUS = circumference / (2 * Math.PI);
  const ANGLE_STEP = 360 / ITEMS_PER_ROW;
  const rows = [];

  for (let i = 0; i < MEDIA.length; i += ITEMS_PER_ROW) {
    const rowItems = MEDIA.slice(i, i + ITEMS_PER_ROW);
    const rowEl = document.createElement('div');
    rowEl.className = 'cylinder-row';
    rowEl.style.height = '160px';
    rowEl.style.width = '0';

    // Offset alternate rows for visual interest
    const rowOffset = (i / ITEMS_PER_ROW) % 2 === 0 ? 0 : ANGLE_STEP / 2;

    rowItems.forEach((item, j) => {
      const angle = j * ANGLE_STEP + rowOffset;
      const el = document.createElement('div');
      el.className = 'cylinder-item' + (item.type === 'video' ? ' cylinder-item--video' : '');
      el.style.transform = `rotateY(${angle}deg) translateZ(${RADIUS}px)`;
      el.dataset.index = i + j;

      if (item.type === 'image') {
        const img = document.createElement('img');
        img.loading = 'lazy';
        img.src = item.src;
        img.alt = item.label;
        el.appendChild(img);
      } else {
        const vid = document.createElement('video');
        vid.muted = true;
        vid.loop = true;
        vid.playsInline = true;
        vid.preload = 'none';
        vid.src = item.src;
        el.appendChild(vid);
        el.addEventListener('mouseenter', () => { vid.play().catch(() => {}); });
        el.addEventListener('mouseleave', () => { vid.pause(); });
      }

      const label = document.createElement('span');
      label.className = 'cylinder-item-label';
      label.textContent = item.label;
      el.appendChild(label);

      el.addEventListener('click', () => openLightbox(i + j));
      rowEl.appendChild(el);
    });

    scene.appendChild(rowEl);
    rows.push({ el: rowEl, angle: 0 });
  }

    isDragging = true;
    lastX = e.clientX;
    dragSpeed = 0;
  });

  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - lastX;
    dragSpeed = dx * 0.3;
    lastX = e.clientX;
  });

  document.addEventListener('mouseup', () => { isDragging = false; });

  function animate() {
    if (!isDragging) {
      dragSpeed *= 0.95;
    }
    const speed = autoSpeed + dragSpeed;

    rows.forEach((row, i) => {
      // Alternate rows rotate in opposite directions, slight speed variation
      const dir = i % 2 === 0 ? 1 : -1;
      const variation = 1 + (i % 3) * 0.08;
      row.angle += speed * dir * variation;
      row.el.style.transform = `rotateY(${row.angle}deg)`;
    });

    requestAnimationFrame(animate);
  }
  animate();

  // ── Lightbox ──
  const lb = document.getElementById('lb');
  const lbContent = document.getElementById('lb-content');
  const lbCaption = document.getElementById('lb-caption');
  const lbClose = document.getElementById('lb-close');

  function openLightbox(idx) {
    const item = MEDIA[idx];
    lbContent.innerHTML = '';

    if (item.type === 'video') {
      const vid = document.createElement('video');
      vid.src = item.hq || item.src;
      vid.controls = true;
      vid.autoplay = true;
      vid.playsInline = true;
      lbContent.appendChild(vid);
    } else {
      const img = document.createElement('img');
      img.src = item.src;
      lbContent.appendChild(img);
    }

    lbCaption.textContent = item.label;
    lb.classList.add('is-open');
  }

  function closeLightbox() {
    lb.classList.remove('is-open');
    const vid = lbContent.querySelector('video');
    if (vid) { vid.pause(); vid.src = ''; }
    lbContent.innerHTML = '';
  }

  lbClose.addEventListener('click', closeLightbox);
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && lb.classList.contains('is-open')) closeLightbox();
  });

  // ── Custom cursor ──
  const cursor = document.createElement('div');
  cursor.className = 'cursor';
  document.body.appendChild(cursor);
  let mx = 0, my = 0, cx = 0, cy = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.classList.add('visible');
  });
  document.addEventListener('mouseleave', () => cursor.classList.remove('visible'));

  const hoverSel = 'a, button, .cylinder-item';
  document.addEventListener('mouseover', e => {
    if (e.target.closest(hoverSel)) cursor.classList.add('hover');
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest(hoverSel)) cursor.classList.remove('hover');
  });

  (function cursorLoop() {
    cx += (mx - cx) * 0.1;
    cy += (my - cy) * 0.1;
    cursor.style.transform = `translate(calc(${cx}px - 50%), calc(${cy}px - 50%))`;
    requestAnimationFrame(cursorLoop);
  })();
  </script>
</body>
</html>
